<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>

<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Noto Sans JP', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-thumb { background: rgba(120,130,150,.32); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(120,130,150,.5); border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes gv-pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
  @keyframes gv-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes gv-shimmer { 0% { transform: translateX(-110%); } 100% { transform: translateX(240%); } }
  @keyframes gv-bar1 { 0%,100% { transform: scaleY(.55); } 50% { transform: scaleY(1); } }
  input, select, textarea, button { font-family: inherit; }
</style>
</helmet>
<div style="width:100%;height:100vh;min-height:720px;overflow:hidden">{{ app }}</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;A&quot;,&quot;B&quot;,&quot;C&quot;],&quot;default&quot;:&quot;A&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;表示&quot;},&quot;palette&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;ocean&quot;,&quot;teal&quot;,&quot;sage&quot;,&quot;moss&quot;,&quot;indigo&quot;,&quot;plum&quot;,&quot;rose&quot;,&quot;coral&quot;,&quot;terracotta&quot;,&quot;steel&quot;,&quot;graphite&quot;],&quot;default&quot;:&quot;ocean&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;表示&quot;},&quot;lang&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;ja&quot;,&quot;en&quot;],&quot;default&quot;:&quot;ja&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;表示&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;compact&quot;,&quot;default&quot;,&quot;spacious&quot;],&quot;default&quot;:&quot;default&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;表示&quot;}}">
class Component extends DCLogic {
  constructor(props) {
    super(props);
    this.boardRef = React.createRef();
    this.fileRef = React.createRef();
    this.fileHandle = null;
    this.past = []; this.future = [];
    const saved = this.loadPrefs();
    this.state = {
      lang: saved.lang || props.lang || 'ja',
      variant: saved.variant || props.variant || 'A',
      density: saved.density || props.density || 'default',
      palette: saved.palette || props.palette || 'ocean',
      outLv: 3,
      mode: saved.mode || 'week',
      zoom: saved.zoom || 1,
      collapsed: {},
      openMenu: null,
      layers: Object.assign({ plan:true, progress:true, milestones:true, deps:true, critical:true, inazuma:true, today:true, weekend:true, holidays:true, grid:true }, saved.layers),
      cols: Object.assign({ assignee:true, workload:true, duration:true, progress:true }, saved.cols),
      barLabels: Object.assign({ dates:false, name:false, owner:false }, saved.barLabels),
      autoSave: !!saved.autoSave,
      autoReload: saved.autoReload!==false, // 既定オン: 開いたファイルが外部で変わったら自動で読み直す
      extChanged: false,                    // 未保存編集中に外部変更を検知したフラグ（通知のみ）
      edit: false,
      panel: false,
      panelMode: 'node', // 'node' | 'settings'
      dirty: false,
      drag: null,      // bar drag preview {id, ps, pe, days, kind}
      rowDrag: null,   // {id, over}
      hover: null, sel: null, tip: null,
      doc: null, fileName: null,
      booted: false,
    };
  }
  componentDidMount() {
    requestAnimationFrame(() => {
      const el = this.boardRef.current;
      if (el) { const g = this.geo(); el.scrollLeft = Math.max(0, this.dateToX(this.TODAY, g) - 340); }
    });
    document.addEventListener('mousedown', this._closeMenu = (e) => {
      if (this.state.openMenu && !e.target.closest('[data-menu]')) this.setState({ openMenu: null });
    });
    document.addEventListener('keydown', this._keys = (e) => {
      if (!this.state.edit) return;
      const mod = e.metaKey || e.ctrlKey;
      const inField = /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName);
      if (mod && e.key.toLowerCase() === 's') { e.preventDefault(); this.save(); return; }
      if (inField) return;
      if (mod && e.key.toLowerCase() === 'z') { e.preventDefault(); if (e.shiftKey) this.redo(); else this.undo(); }
    });
    this._bootT = setTimeout(() => this.setState({ booted: true }), 520);
    this._pollT = setInterval(() => this.pollFile(), 1500); // 外部変更のポーリング（File System Access API で開いた場合のみ動く）
  }
  componentWillUnmount(){ document.removeEventListener('mousedown', this._closeMenu); document.removeEventListener('keydown', this._keys); clearTimeout(this._bootT); clearTimeout(this._asT); clearInterval(this._pollT); }

  // ---------- preferences ----------
  get PREF_KEY(){ return 'jsonGanttViewer.prefs.v1'; }
  loadPrefs(){ try{ const s=localStorage.getItem(this.PREF_KEY); return s? JSON.parse(s):{}; }catch(e){ return {}; } }
  savePrefs(){ try{ const st=this.state; localStorage.setItem(this.PREF_KEY, JSON.stringify({ lang:st.lang, variant:st.variant, density:st.density, palette:st.palette, mode:st.mode, layers:st.layers, cols:st.cols, barLabels:st.barLabels, autoSave:st.autoSave, autoReload:st.autoReload, zoom:st.zoom })); }catch(e){} }
  componentDidUpdate(pp, ps){ try{ if(!ps){ this.savePrefs(); return; } const k=['lang','variant','density','palette','mode','layers','cols','barLabels','autoSave','autoReload','zoom']; if(k.some(x=>ps[x]!==this.state[x])) this.savePrefs(); }catch(e){ this.savePrefs(); } }

    moss:{ nm:{ja:'モス',en:'Moss'}, sw:'#6d7a3a', accentL:'#697538', accentD:'#a2b25e', ramp:'sage', ina:'#b0623c', inaD:'#d59a6a' },
  }; }
  buildTheme(sk,pk){
    const S=this.STRUCT[sk]||this.STRUCT.A, P=this.PALETTES[pk]||this.PALETTES.ocean, dark=S.dark;
    const ramp=(dark?this.RAMPS.dark:this.RAMPS.light)[P.ramp]||(dark?this.RAMPS.dark.cool:this.RAMPS.light.cool);
    const accent=dark?P.accentD:P.accentL;
    return { ...S, ...ramp, dark, glow:S.glow, mono:S.mono, radius:S.radius, rowH:S.rowH, headerH:S.headerH, fs:S.fs,
      blue:accent, ina:dark?(P.inaD||P.ina):P.ina, today:dark?'#e77a63':'#db5f47',
      hover:this.hex(accent, dark?.12:.06),
      shadow: dark?'0 2px 8px rgba(0,0,0,.35)':(S.mono?'0 1px 2px rgba(20,28,44,.06)':'0 1px 2px rgba(20,28,44,.05), 0 2px 6px rgba(20,28,44,.06)'),
      barShadow: dark?'0 1px 3px rgba(0,0,0,.45)':(S.mono?'none':'0 1px 1.5px rgba(20,28,44,.14)') };
  }
  get T(){ return this.buildTheme(this.state.variant, this.state.palette); }

  get L(){ return this.I18N[this.state.lang]; }

  // ---------- data ----------
  get META(){ return (this.state.doc && this.state.doc.meta) || this._defMeta; }
  get _defMeta(){ return {
    ja:{ title:'ガントチャート ビューアー', subtitle:'ソフトウェア開発ロードマップ' },
    en:{ title:'Gantt Chart Viewer',        subtitle:'Software delivery roadmap' },
  }; }
  get CAL(){ return (this.state.doc && this.state.doc.calendar) || { workweek:[1,2,3,4,5], holidays:{}, extra:{} }; }
  isoKey(d){ return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
  keyToIso(k){ const p=k.split('-'); return p[0]+'-'+String(p[1]).padStart(2,'0')+'-'+String(p[2]).padStart(2,'0'); }
  iso(d){ const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
  dayKind(d){ const cal=this.CAL, k=this.isoKey(d);
    if(cal.extra && cal.extra[k]) return {};
    if(cal.holidays && cal.holidays[k]) return {holiday:true, label:cal.holidays[k]};
    if(!(cal.workweek||[1,2,3,4,5]).includes(d.getDay())) return {weekend:true};
    return {}; }
  wday(i){ return (this.state.lang==='ja'?['日','月','火','水','木','金','土']:['Su','Mo','Tu','We','Th','Fr','Sa'])[i]; }
  workdays(a,b){ let n=0; for(let d=new Date(a); d<=b; d=this.addD(d,1)){ const k=this.dayKind(d); if(!k.weekend&&!k.holiday) n++; } return n; } // 稼働日数（週末・祝日抜き、extraWorkdays は稼働）

  get DATA(){ return (this.state.doc && this.state.doc.projects) || this._defProjects; }
  get _defProjects(){ if(!this.__defP){ this.__defP = [
    { id:'P1', ja:'モバイルアプリ v3.0 リリース', en:'Mobile App v3.0 Release', accent:true,

  genId(){ return 'n'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

  normalizeDoc(j){
    const asg={}; const a=j.assignees||{};

      const ms=(t.milestones||[]).map(m=>({date:m.date, ja:m.ja||m.en||'', en:m.en||m.ja||'', rose:!!m.rose})); // v2.4: 任意階層のマイルストーン

      children:(p.phases||p.children||p.tasks||[]).map(normNode) }));

    (rc.holidays||j.holidays||[]).forEach(h=>{ const ds=(typeof h==='string')?h:(h&&h.date); const d=this.pd(ds); if(!d) return; const lab=(typeof h==='string')?{ja:'',en:''}:{ja:h.ja||h.en||h.label||'',en:h.en||h.ja||h.label||''}; cal.holidays[this.isoKey(d)]=lab; });

  serializeDoc(){
    const D=this.curDoc();
    const wnode=(n)=>{ const o={id:n.id, ja:n.ja, en:n.en};
      if(n.milestones&&n.milestones.length) o.milestones=n.milestones.map(m=>{ const x={date:m.date, ja:m.ja, en:m.en}; if(m.rose) x.rose=true; return x; });
      if(n.children && n.children.length){ if(n.who) o.who=n.who; if(n.crit) o.critical=true; if(n.deps&&n.deps.length) o.deps=n.deps.slice(); if(n.note) o.note=n.note; o.children=n.children.map(wnode); return o; }
      if(n.who) o.who=n.who;
      o.plan={start:n.ps||null, end:n.pe||null}; o.actual={start:n.as||null, end:n.ae||null};
      o.progress=n.prog||0; o.personDays=n.pd||0;
      if(n.crit) o.critical=true; if(n.deps&&n.deps.length) o.deps=n.deps.slice(); if(n.note) o.note=n.note;
      o.children=[]; return o; };
    const cal=D.calendar||{workweek:[1,2,3,4,5],holidays:{},extra:{}};
    const holidays=Object.keys(cal.holidays||{}).map(k=>({date:this.keyToIso(k), ja:(cal.holidays[k]||{}).ja||'', en:(cal.holidays[k]||{}).en||''}));
    const extraWorkdays=Object.keys(cal.extra||{}).map(k=>this.keyToIso(k));
    const assignees={}; Object.keys(D.assignees||{}).forEach(k=>{ const v=D.assignees[k]; assignees[k]={ja:v.ja, en:v.en, color:v.c}; if(v.abbr) assignees[k].abbr=v.abbr; });
    return { meta:D.meta||this._defMeta, calendar:{workweek:cal.workweek||[1,2,3,4,5], holidays, extraWorkdays}, assignees,
      projects:(D.projects||[]).map(p=>{ const o={id:p.id, ja:p.ja, en:p.en}; if(p.accent) o.accent=true;
        o.milestones=(p.milestones||[]).map(m=>{ const x={date:m.date, ja:m.ja, en:m.en}; if(m.rose) x.rose=true; return x; });
        o.children=(p.children||[]).map(wnode); return o; }) };
  }

  // ---------- tree utils ----------
  findNode(doc,id){ let res=null; const rec=(arr,parent)=>{ for(let i=0;i<arr.length;i++){ const n=arr[i]; if(n.id===id){ res={node:n, arr, idx:i, parent}; return true; } if(n.children&&n.children.length&&rec(n.children,n)) return true; } return false; }; rec(doc.projects,null); return res; }
  isDescId(node,id){ if(!node.children) return false; for(const c of node.children){ if(c.id===id||this.isDescId(c,id)) return true; } return false; }
  leavesOf(n){ const out=[]; const rec=m=>{ if(m.children&&m.children.length) m.children.forEach(rec); else out.push(m); }; rec(n); return out; }
  allLeaves(){ const out=[]; this.DATA.forEach(p=>out.push(...this.leavesOf(p).filter(x=>x!==p))); return out; }

  // ---------- mutations / undo ----------
  mutate(fn, opts){ const doc=this.curDoc();
    this.past.push(JSON.stringify(doc)); if(this.past.length>120) this.past.shift(); this.future=[];
    const nd=JSON.parse(JSON.stringify(doc)); fn(nd);
    this.setState({doc:nd, dirty:true}, ()=>this.maybeAutosave()); }
  undo(){ if(!this.past.length) return; this.future.push(JSON.stringify(this.curDoc())); const s=this.past.pop(); this.setState({doc:JSON.parse(s), dirty:true}, ()=>this.maybeAutosave()); }
  redo(){ if(!this.future.length) return; this.past.push(JSON.stringify(this.curDoc())); const s=this.future.pop(); this.setState({doc:JSON.parse(s), dirty:true}, ()=>this.maybeAutosave()); }

  setField(id,f,v){ this.mutate(d=>{ const r=this.findNode(d,id); if(r) r.node[f]=v; }); }
  newTaskNode(){ const t=this.TODAY; return { id:this.genId(), ja:this.L.newTaskName, en:'New task', who:null, ps:this.iso(t), pe:this.iso(this.addD(t,4)), as:null, ae:null, prog:0, pd:1, crit:false, deps:[], note:'', children:[] }; }
  addSibling(id){ const nn=this.newTaskNode(); this.mutate(d=>{ const r=this.findNode(d,id); if(!r){ return; } if(r.parent===null){ // sibling of a project → new task inside project
      r.node.children=r.node.children||[]; r.node.children.push(nn); } else { r.arr.splice(r.idx+1,0,nn); } });
    this.setState({sel:nn.id}); }
  addChild(id){ const nn=this.newTaskNode(); this.mutate(d=>{ const r=this.findNode(d,id); if(r){ r.node.children=r.node.children||[]; r.node.children.push(nn); } });
    this.setState(s=>({sel:nn.id, collapsed:{...s.collapsed,[id]:false}})); }
  addProject(){ const t=this.TODAY; const p={ id:this.genId(), ja:this.L.newProjName, en:'New project', accent:false, milestones:[], children:[ this.newTaskNode() ] };
    this.mutate(d=>{ d.projects.push(p); }); this.setState({sel:p.id}); }
  delNode(id){ const doc=this.curDoc(); const r=this.findNode(doc,id); if(!r) return;
    if(r.node.children&&r.node.children.length && !window.confirm(this.L.confirmDel)) return;
    this.mutate(d=>{ const x=this.findNode(d,id); if(x) x.arr.splice(x.idx,1); });
    if(this.state.sel===id) this.setState({sel:null}); }
  moveNode(id,dir){ this.mutate(d=>{ const r=this.findNode(d,id); if(!r) return; const j=r.idx+dir; if(j<0||j>=r.arr.length) return; const [n]=r.arr.splice(r.idx,1); r.arr.splice(j,0,n); }); }
  indent(id){ this.mutate(d=>{ const r=this.findNode(d,id); if(!r||r.idx===0) return; const prev=r.arr[r.idx-1]; if(this.isDescId(r.node,prev.id)) return; r.arr.splice(r.idx,1); prev.children=prev.children||[]; prev.children.push(r.node); }); }
  outdent(id){ this.mutate(d=>{ const r=this.findNode(d,id); if(!r||!r.parent) return; const pr=this.findNode(d,r.parent.id); if(!pr||pr.parent===null) return; /* 深さ1はトップレベル化させない（プロジェクト行扱いになり plan 等が保存で失われるため） */ r.arr.splice(r.idx,1); pr.arr.splice(pr.idx+1,0,r.node); }); }
  addAssignee(){ const nm=window.prompt(this.state.lang==='ja'?'担当者名':'Member name'); if(!nm) return null;
    const key=nm.trim(); this.mutate(d=>{ d.assignees=d.assignees||{}; if(!d.assignees[key]) d.assignees[key]={ja:key,en:key,c:this.autoColor(key)}; }); return key; }

  loadJsonText(txt,name,handle){ try{ const j=JSON.parse(txt); const doc=this.normalizeDoc(j); if(!doc.projects.length) throw new Error(this.state.lang==='ja'?'projects が空です':'no projects found');
      { const seen=new Set(), dups=new Set(); const recId=n=>{ if(seen.has(n.id)) dups.add(n.id); seen.add(n.id); (n.children||[]).forEach(recId); }; doc.projects.forEach(recId);
        if(dups.size) window.alert((this.state.lang==='ja'?'警告: id が重複しています。deps の矢印や編集操作が誤動作する可能性があります:\n':'Warning: duplicate ids — dependency arrows and editing may misbehave:\n')+[...dups].join(', ')); }
      this.fileHandle=handle||null; this._mtime=null; this.past=[]; this.future=[];

  som(d){ return new Date(d.getFullYear(), d.getMonth(), 1, 12); }
  eom(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0, 12); }
  sow(d){ const wd=(d.getDay()+6)%7; return this.addD(d,-wd); }
  monJa(m){ return (m+1)+'月'; }
  monEn(m){ return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m]; }
  fmtMD(d){ return (d.getMonth()+1)+'/'+d.getDate(); }
  fmtFull(d){ if(!d) return '—'; return this.state.lang==='ja' ? `${d.getMonth()+1}/${d.getDate()}` : `${this.monEn(d.getMonth())} ${d.getDate()}`; }

  // ---------- geometry ----------
  geo(){
    let min=null, max=null;
    const scan=s=>{ if(!s) return; const d=this.pd(s); if(!d) return; if(!min||d<min)min=d; if(!max||d>max)max=d; };
    const rec=n=>{ [n.ps,n.pe,n.as,n.ae].forEach(scan); (n.milestones||[]).forEach(m=>scan(m.date)); (n.children||[]).forEach(rec); };
    this.DATA.forEach(rec);
    const dg=this.state.drag; if(dg && dg.ps && dg.pe){ scan(this.iso(dg.ps)); scan(this.iso(dg.pe)); }
    if(!min){ min=this.TODAY; max=this.addD(this.TODAY,30); }
    if(!max) max=this.addD(min,30);
    const cs = this.sow(this.som(min));
    let ce = this.eom(max); ce = this.addD(this.sow(ce), 13);
    const px = { day:34, week:12, month:5 }[this.state.mode] * (this.state.zoom || 1);
    const totalDays = this.dd(cs,ce)+1;
    return { cs, ce, px, totalDays, w: totalDays*px };
  }
  dateToX(d,g){ return this.dd(g.cs,d)*g.px; }

  timeCols(g){
    const mode=this.state.mode, ja=this.state.lang==='ja';
    const tier1=[], tier2=[];
    if(mode==='month'){
      let y=g.cs.getFullYear(), last=g.ce.getFullYear();
      for(;y<=last;y++){
        const s=new Date(y,0,1,12) < g.cs ? g.cs : new Date(y,0,1,12);
        const e=new Date(y,11,31,12) > g.ce ? g.ce : new Date(y,11,31,12);
        tier1.push({label:y+(ja?'年':''), left:this.dateToX(s,g), width:(this.dd(s,e)+1)*g.px});
      }
      let cur=this.som(g.cs);
      while(cur<=g.ce){
        const s=cur<g.cs?g.cs:cur, e=this.eom(cur)>g.ce?g.ce:this.eom(cur);
        tier2.push({label: ja?this.monJa(cur.getMonth()):this.monEn(cur.getMonth()), left:this.dateToX(s,g), width:(this.dd(s,e)+1)*g.px, key:cur.getTime()});
        cur=this.addD(this.eom(cur),1);
      }
    } else {
      let cur=this.som(g.cs);
      while(cur<=g.ce){
        const s=cur<g.cs?g.cs:cur, e=this.eom(cur)>g.ce?g.ce:this.eom(cur);
        tier1.push({label: ja?`${cur.getFullYear()}年${cur.getMonth()+1}月`:`${this.monEn(cur.getMonth())} ${String(cur.getFullYear()).slice(2)}`, left:this.dateToX(s,g), width:(this.dd(s,e)+1)*g.px, key:cur.getTime()});
        cur=this.addD(this.eom(cur),1);
      }
      if(mode==='day'){
        let d=new Date(g.cs);
        while(d<=g.ce){ const wd=d.getDay(); const kind=this.dayKind(d); tier2.push({label:String(d.getDate()), wd:wd, left:this.dateToX(d,g), width:g.px, weekend:!!kind.weekend, holiday:!!kind.holiday, hLabel:(kind.holiday&&kind.label)?(ja?kind.label.ja:kind.label.en):null, key:d.getTime()}); d=this.addD(d,1); }
      } else {
        let d=this.sow(g.cs);
        while(d<=g.ce){ const s=d<g.cs?g.cs:d; tier2.push({label:this.fmtMD(d), left:this.dateToX(s,g), width:g.px*7, key:d.getTime()}); d=this.addD(d,7); }
      }
    }
    return {tier1, tier2};
  }

  // ---------- rows ----------
  buildRows(){
    const rows=[]; const st=this.state;
    const walk=(n,depth,no,parentId)=>{
      const kids=n.children||[];
      const kind = depth===0 ? 'project' : (kids.length? 'group':'task');
      const row={kind, id:n.id, depth, no, node:n, parent:parentId};
      if(kind!=='task') row.agg=this.agg(this.leavesOf(n).filter(x=>x!==n));
      if(n.milestones&&n.milestones.length) row.milestones=n.milestones; // v2.4: 任意階層に置ける
      rows.push(row);
      if(kind!=='task' && !st.collapsed[n.id]) kids.forEach((c,i)=>walk(c,depth+1,no+'.'+(i+1),n.id));
    };
    this.DATA.forEach((p,i)=>walk(p,0,String(i+1),null));
    return rows;
  }
  agg(tasks){
    let min=null,max=null,wsum=0,psum=0,dsum=0,dpsum=0,n=0,ssum=0;
    tasks.forEach(t=>{ const s=this.pd(t.ps),e=this.pd(t.pe); if(s&&(!min||s<min))min=s; if(e&&(!max||e>max))max=e;
      wsum+=(t.pd||0); psum+=(t.pd||0)*(t.prog||0);
      const dur=(s&&e)? this.dd(s,e)+1:0; dsum+=dur; dpsum+=dur*(t.prog||0);
      n++; ssum+=(t.prog||0); });
    // 進捗集計: 人日加重 →（pd が全て未指定なら）期間加重 → 単純平均 の順にフォールバック
    const prog = wsum? psum/wsum : (dsum? dpsum/dsum : (n? ssum/n : 0));
    return {ps:min, pe:max, prog, pd:wsum};
  }
  leafMap(){
    const rows=this.buildRows(); const m={};
    rows.forEach((r,i)=>{ if(r.kind==='task') m[r.id]={ps:this.pd(r.node.ps), pe:this.pd(r.node.pe), row:i, crit:r.node.crit};
      else if(r.agg&&r.agg.ps) m[r.id]=m[r.id]||{ps:r.agg.ps, pe:r.agg.pe, row:i, crit:false}; });
    return {rows, m};
  }
  statusOf(t){
    const today=this.TODAY, ps=this.pd(t.ps), pe=this.pd(t.pe);
    if(!ps||!pe) return 'future';
    if(t.prog>=1 || t.ae) return 'done'; // actual.end 記入済みは完了扱い（progress の記入漏れに寛容に）
    if(today>pe) return 'delay';
    if(t.prog===0 && today>ps) return 'risk';
    const frac=Math.max(0,Math.min(1,this.dd(ps,pe)? this.dd(ps,today)/this.dd(ps,pe):0));
    if(t.prog>0 && t.prog < frac-0.12) return 'risk';
    if(t.prog>0) return 'ontrack';
    return 'future';
  }
  statusColor(s,T){ return {ontrack:T.blue, done:T.done, risk:T.amber, delay:T.rose, future:T.faint}[s]; }

  // ---------- handlers ----------
  toggle(id){ this.setState(st=>({collapsed:{...st.collapsed,[id]:!st.collapsed[id]}, outLv:0})); }
  setLevel(lv){ const c={};
    if(lv<3){ const rec=(n,depth)=>{ if(n.children&&n.children.length){ if(depth>=lv-1) c[n.id]=true; n.children.forEach(k=>rec(k,depth+1)); } };
      this.DATA.forEach(p=>rec(p,0)); }
    this.setState({collapsed:c, outLv:lv}); }
  setMode(m){ const el=this.boardRef.current; const g0=this.geo(); const cx = el? (el.scrollLeft+el.clientWidth/2 - this.leftW())/g0.px : 0;
    this.setState({mode:m}, ()=>{ const g=this.geo(); const el2=this.boardRef.current; if(el2) el2.scrollLeft=Math.max(0, cx*g.px + this.leftW() - el2.clientWidth/2); }); }
  get ZOOMS(){ return [0.5, 0.75, 1, 1.25, 1.5, 2, 3]; }
  setZoom(z){ z=Math.max(0.5, Math.min(3, z)); if(z===this.state.zoom) return;
    const el=this.boardRef.current; const g0=this.geo(); const cx = el? (el.scrollLeft+el.clientWidth/2 - this.leftW())/g0.px : 0;
    this.setState({zoom:z}, ()=>{ const g=this.geo(); const el2=this.boardRef.current; if(el2) el2.scrollLeft=Math.max(0, cx*g.px + this.leftW() - el2.clientWidth/2); }); }
  stepZoom(dir){ const zs=this.ZOOMS, z=this.state.zoom||1;
    let i=zs.findIndex(v=>Math.abs(v-z)<0.001); if(i<0){ i=zs.findIndex(v=>v>z); if(i<0) i=zs.length-1; if(dir<0) i--; }
    else i+=dir;
    this.setZoom(zs[Math.max(0, Math.min(zs.length-1, i))]); }
  toggleLayer(k){ this.setState(st=>({layers:{...st.layers,[k]:!st.layers[k]}})); }
  toggleCol(k){ this.setState(st=>({cols:{...st.cols,[k]:!st.cols[k]}})); }
  jumpToday(){ const el=this.boardRef.current; const g=this.geo(); if(el) el.scrollTo({left:Math.max(0,this.dateToX(this.TODAY,g)-340), behavior:'smooth'}); }
  showTip(ev,d){ if(this.state.drag||this.state.rowDrag) return; this.setState({tip:{d, x:ev.clientX, y:ev.clientY}}); }
  hideTip(){ if(this.state.tip) this.setState({tip:null}); }
  select(r){ if(!r) return; const rows=this.buildRows(); const idx=rows.findIndex(x=>x.id===r.id); this.setState({sel:r.id}); this.ensureVisible(idx); const el=this.boardRef.current; if(el&&!this.state.edit) el.focus({preventScroll:true}); }
  ensureVisible(idx){ const el=this.boardRef.current; if(!el||idx<0) return; const rowH=this.rh(), hH=this.T.headerH; const top=hH+idx*rowH, bot=top+rowH; if(top < el.scrollTop+hH) el.scrollTop=top-hH; else if(bot > el.scrollTop+el.clientHeight) el.scrollTop=bot-el.clientHeight; }
  onKey(ev){ const k=ev.key;
    if(this.state.edit && this.state.sel){
      if(k==='Tab'){ ev.preventDefault(); if(ev.shiftKey) this.outdent(this.state.sel); else this.indent(this.state.sel); return; }
      if(k==='Enter'){ ev.preventDefault(); this.setState(s=>({panel:!s.panel, panelMode:'node'})); return; }
    }
    if(k!=='ArrowDown'&&k!=='ArrowUp'&&k!=='ArrowRight'&&k!=='ArrowLeft') return; ev.preventDefault(); const rows=this.buildRows(); let idx=rows.findIndex(r=>r.id===this.state.sel);
    if(k==='ArrowDown'){ idx = idx<0?0:Math.min(rows.length-1, idx+1); this.select(rows[idx]); }
    else if(k==='ArrowUp'){ idx = idx<0?0:Math.max(0, idx-1); this.select(rows[idx]); }
    else if(k==='ArrowRight'){ const r=rows[idx]; if(!r){ this.select(rows[0]); return; } if(r.kind!=='task'){ if(this.state.collapsed[r.id]) this.setState(s=>({collapsed:{...s.collapsed,[r.id]:false}, outLv:0})); else if(rows[idx+1]) this.select(rows[idx+1]); } }
    else if(k==='ArrowLeft'){ const r=rows[idx]; if(!r) return; if(r.kind!=='task' && !this.state.collapsed[r.id]) this.setState(s=>({collapsed:{...s.collapsed,[r.id]:true}, outLv:0})); else if(r.parent){ const pr=rows.find(x=>x.id===r.parent); if(pr) this.select(pr); } } }

  barDown(ev,t,kind){

      if(kind==='move'){ nps=this.addD(ps0,days); npe=this.addD(pe0,days); }
      else if(kind==='l'){ nps=this.addD(ps0,Math.min(days,this.dd(ps0,pe0))); }
      else { npe=this.addD(pe0,Math.max(days,-this.dd(ps0,pe0))); }
      this.setState({drag:{id:t.id, ps:nps, pe:npe, days, kind}, tip:null}); };
    const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); document.body.style.cursor='';
      const d=this.state.drag; this.setState({drag:null});
      if(d && (d.ps.getTime()!==ps0.getTime() || d.pe.getTime()!==pe0.getTime())){
        const a=this.iso(d.ps), b=this.iso(d.pe);
        this.mutate(doc=>{ const f=this.findNode(doc,t.id); if(f){ f.node.ps=a; f.node.pe=b; } }); } };

    if(!this.state.edit) return;

    const el=this.boardRef.current; if(!el) return;
    const rect=el.getBoundingClientRect();

      let p=(px-x1)/w; p=Math.max(0,Math.min(1,p));

    const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); document.body.style.cursor='';
      const d=this.state.drag; this.setState({drag:null});
      if(d && d.prog!==prog0){ this.mutate(doc=>{ const f=this.findNode(doc,t.id); if(!f) return; f.node.prog=d.prog; }); } };
    document.body.style.cursor='ew-resize';

  rowDragDown(ev,r){
    if(!this.state.edit) return;
    ev.preventDefault(); ev.stopPropagation();
    const rowH=this.rh(), hH=this.T.headerH;
    const move=e2=>{ const el=this.boardRef.current; if(!el) return; const rect=el.getBoundingClientRect();
      const y=e2.clientY-rect.top+el.scrollTop-hH; const rows=this.buildRows();
      const over=Math.max(0,Math.min(rows.length, Math.round(y/rowH)));
      this.setState({rowDrag:{id:r.id, over}, tip:null}); };
    const up=()=>{ document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); document.body.style.cursor='';
      const rd=this.state.rowDrag; this.setState({rowDrag:null});

  commitRowMove(id, over){
    const rowsOld=this.buildRows();
    const fromIdx=rowsOld.findIndex(r=>r.id===id);
    if(fromIdx<0 || over===fromIdx || over===fromIdx+1) return;
    const target=rowsOld[over]; // insert BEFORE this row (undefined → append at end)
    this.mutate(d=>{
      const f=this.findNode(d,id); if(!f) return;
      if(target && (target.id===id || this.isDescId(f.node,target.id))) return;
      f.arr.splice(f.idx,1);
      if(!target){ // append: as last sibling of last root
        const lastP=d.projects[d.projects.length-1];
        if(!lastP){ d.projects.push(f.node); return; }
        if(f.parent===null){ d.projects.push(f.node); } else { lastP.children=lastP.children||[]; lastP.children.push(f.node); }
        return; }
      const tf=this.findNode(d,target.id); if(!tf){ f.arr.splice(Math.min(f.idx,f.arr.length),0,f.node); return; }
      tf.arr.splice(tf.idx,0,f.node);

  // ---------- SVG overlay ----------
  roundPath(pts,r){
    if(pts.length<2) return '';
    let d='M'+pts[0][0].toFixed(1)+','+pts[0][1].toFixed(1);
    for(let i=1;i<pts.length-1;i++){
      const p=pts[i], a=pts[i-1], b=pts[i+1];
      const v1=[p[0]-a[0],p[1]-a[1]], v2=[b[0]-p[0],b[1]-p[1]];
      const l1=Math.hypot(v1[0],v1[1])||1, l2=Math.hypot(v2[0],v2[1])||1;
      const rr=Math.min(r,l1/2,l2/2);
      const p1=[p[0]-v1[0]/l1*rr, p[1]-v1[1]/l1*rr], p2=[p[0]+v2[0]/l2*rr, p[1]+v2[1]/l2*rr];
      d+=' L'+p1[0].toFixed(1)+','+p1[1].toFixed(1)+' Q'+p[0].toFixed(1)+','+p[1].toFixed(1)+' '+p2[0].toFixed(1)+','+p2[1].toFixed(1);
    }
    d+=' L'+pts[pts.length-1][0].toFixed(1)+','+pts[pts.length-1][1].toFixed(1);
    return d;
  }

      const depCol = T.dark? this.hex(T.faint,.9) : '#98a5ba';
      walkAll.forEach(t=>{ (t.deps||[]).forEach(dep=>{
        const a=m[dep], b=m[t.id]; if(!a||!b||!a.ps||!b.ps) return;
        const x1=this.dateToX(a.pe,g)+g.px, y1=a.row*rowH+rowH/2;
        const x2=this.dateToX(b.ps,g), y2=b.row*rowH+rowH/2;
        const isCrit = st.layers.critical && a.crit && b.crit;
        const col = isCrit? T.crit : depCol;
        const gap=10; const mx=x1+gap;
        let pts;
        if(x2>=mx+4){ pts=[[x1,y1],[mx,y1],[mx,y2],[x2-5,y2]]; }
        else { const back=x2-gap; const midY = y2>y1? (a.row+1)*rowH : a.row*rowH; pts=[[x1,y1],[mx,y1],[mx,midY],[back,midY],[back,y2],[x2-5,y2]]; }
        const d=this.roundPath(pts,6);

    let ina=null;

      const leaves=rows.map((r,i)=>({r,i})).filter(o=>o.r.kind==='task' || (st.collapsed[o.r.id] && o.r.agg && o.r.agg.ps && o.r.agg.pe)); // 折りたたみ中のグループは集計値で1点打つ（配下タスクの遅延情報を落とさない）
      if(leaves.length){

      body.push(e('div',{key:'d2',style:{height:1,background:T.grid}}));
      body.push(this.panelField(L.msL, e('div',{style:{display:'flex',flexDirection:'column',gap:7}},
        (n.milestones||[]).map((ms,i)=>e('div',{key:i,style:{display:'flex',alignItems:'center',gap:5}},
          e('span',{onClick:()=>this.mutate(d=>{ const f=this.findNode(d,n.id); if(f) f.node.milestones[i].rose=!f.node.milestones[i].rose; }),
            title:ja?'色を切替':'Toggle color',
            style:{width:11,height:11,background:ms.rose?T.rose:T.ms,transform:'rotate(45deg)',borderRadius:2,cursor:'pointer',flex:'0 0 auto'}}),
          e('input',{key:'msd'+i+ms.date, type:'date', defaultValue:ms.date, onChange:ev=>{ const v=ev.target.value; if(v) this.mutate(d=>{ const f=this.findNode(d,n.id); if(f) f.node.milestones[i].date=v; }); },
            style:{width:118,border:'1px solid '+T.gridStrong,background:T.panel,color:T.text,borderRadius:6,padding:'3px 4px',fontSize:10.5,fontFamily:"'JetBrains Mono',monospace",outline:'none',colorScheme:T.dark?'dark':'light'}}),
          e('input',{key:'msl'+i+(ja?ms.ja:ms.en), defaultValue:ja?ms.ja:ms.en, onBlur:ev=>{ const v=ev.target.value; this.mutate(d=>{ const f=this.findNode(d,n.id); if(f){ f.node.milestones[i][ja?'ja':'en']=v; if(!f.node.milestones[i][ja?'en':'ja']) f.node.milestones[i][ja?'en':'ja']=v; } }); },
            onKeyDown:ev=>{ if(ev.key==='Enter') ev.target.blur(); },
            style:{flex:1,minWidth:0,border:'1px solid '+T.gridStrong,background:T.panel,color:T.text,borderRadius:6,padding:'3px 7px',fontSize:11.5,outline:'none'}}),
          e('span',{onClick:()=>this.mutate(d=>{ const f=this.findNode(d,n.id); if(f) f.node.milestones.splice(i,1); }),style:{color:T.faint,cursor:'pointer',fontWeight:700,fontSize:12,flex:'0 0 auto'}},'✕'))),
        this.smallBtn(L.addMs, ()=>this.mutate(d=>{ const f=this.findNode(d,n.id); if(f){ f.node.milestones=f.node.milestones||[]; f.node.milestones.push({date:this.iso(this.TODAY), ja:this.L.newMsName, en:'Milestone', rose:false}); } }), {accent:true}))));
    }
    body.push(e('div',{key:'d3',style:{height:1,background:T.grid}}));
    body.push(e('div',{key:'del',style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      e('span',{onClick:()=>this.delNode(n.id),style:{fontSize:11.5,color:T.crit,fontWeight:600,cursor:'pointer'}}, L.delTask),
      e('span',{style:{fontSize:10,color:T.faint}}, 'Enter')));
    return e('div',{style:this.panelStyle()}, body);
  }
  panelStyle(){ const T=this.T; return {width:300,flex:'0 0 auto',background:T.panel,borderLeft:'1px solid '+T.gridStrong,padding:'14px 16px',display:'flex',flexDirection:'column',gap:12,overflowY:'auto',zIndex:45,
    boxShadow:T.dark?'-6px 0 18px rgba(0,0,0,.3)':'-6px 0 18px rgba(20,28,44,.06)'}; }

  renderSettingsPanel(){
    const e=React.createElement, T=this.T, L=this.L, ja=this.state.lang==='ja';
    const doc=this.curDoc(); const meta=doc.meta||this._defMeta; const cal=doc.calendar||{workweek:[1,2,3,4,5],holidays:{},extra:{}};
    const body=[];
    body.push(e('div',{key:'h',style:{display:'flex',alignItems:'center',gap:8}},
      e('span',{style:{fontSize:13.5,fontWeight:700,color:T.text,flex:1}}, '⚙ '+L.settings),
      e('button',{onClick:()=>this.setState({panel:false}),style:{border:'none',background:'transparent',color:T.faint,cursor:'pointer',fontSize:15,padding:2}},'✕')));
    // meta
    const mset=(lang,f,v)=>this.mutate(d=>{ d.meta=d.meta||JSON.parse(JSON.stringify(this._defMeta)); d.meta[lang]=d.meta[lang]||{}; d.meta[lang][f]=v; });
    body.push(this.panelField(L.metaL, e('div',{style:{display:'flex',flexDirection:'column',gap:5}},
      this.panelInput((meta[this.state.lang]||{}).title||'', v=>mset(this.state.lang,'title',v), {k:'mt'+((meta[this.state.lang]||{}).title||'')}),
      this.panelInput((meta[this.state.lang]||{}).subtitle||'', v=>mset(this.state.lang,'subtitle',v), {k:'ms'+((meta[this.state.lang]||{}).subtitle||'')}))));
    // workweek
    body.push(this.panelField(L.workweekL, e('div',{style:{display:'flex',gap:4}},
      [0,1,2,3,4,5,6].map(d=>{ const on=(cal.workweek||[]).includes(d);
        return e('span',{key:d, onClick:()=>this.mutate(doc2=>{ const c=doc2.calendar=doc2.calendar||{workweek:[1,2,3,4,5],holidays:{},extra:{}}; const ww=new Set(c.workweek||[1,2,3,4,5]); if(ww.has(d)) ww.delete(d); else ww.add(d); c.workweek=[...ww].sort(); }),
          style:{width:28,height:26,borderRadius:6,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,cursor:'pointer',
            background:on?T.blue:T.track,color:on?'#fff':T.faint}}, this.wday(d)); }))));
    // holidays
    const hkeys=Object.keys(cal.holidays||{});
    body.push(this.panelField(L.holidaysL, e('div',{style:{display:'flex',flexDirection:'column',gap:6}},
      hkeys.map(k=>e('div',{key:k,style:{display:'flex',alignItems:'center',gap:5}},
        e('span',{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:T.dim,width:82,flex:'0 0 auto'}}, this.keyToIso(k)),
        e('input',{key:'hl'+k, defaultValue:ja?(cal.holidays[k]||{}).ja:(cal.holidays[k]||{}).en,
          onBlur:ev=>this.mutate(d=>{ const c=d.calendar; if(c&&c.holidays[k]){ c.holidays[k][ja?'ja':'en']=ev.target.value; if(!c.holidays[k][ja?'en':'ja']) c.holidays[k][ja?'en':'ja']=ev.target.value; } }),
          style:{flex:1,minWidth:0,border:'1px solid '+T.gridStrong,background:T.panel,color:T.text,borderRadius:6,padding:'3px 7px',fontSize:11.5,outline:'none'}}),
        e('span',{onClick:()=>this.mutate(d=>{ if(d.calendar) delete d.calendar.holidays[k]; }),style:{color:T.faint,cursor:'pointer',fontWeight:700}},'✕'))),
      e('input',{key:'addhol'+hkeys.length, type:'date', onChange:ev=>{ const v=ev.target.value; if(!v) return; const d2=this.pd(v); if(!d2) return;
          this.mutate(d=>{ const c=d.calendar=d.calendar||{workweek:[1,2,3,4,5],holidays:{},extra:{}}; c.holidays[this.isoKey(d2)]={ja:'',en:''}; }); ev.target.value=''; },
        style:{border:'1px dashed '+T.gridStrong,background:T.panel,color:T.blue,borderRadius:6,padding:'4px 6px',fontSize:11,outline:'none',colorScheme:T.dark?'dark':'light'}}))));
    // members
    const A=doc.assignees||{};
    body.push(this.panelField(L.membersL, e('div',{style:{display:'flex',flexDirection:'column',gap:6}},
      Object.keys(A).map(k=>e('div',{key:k,style:{display:'flex',alignItems:'center',gap:7}},
        e('span',{title:ja?'アバターの表示（イニシャル欄で変更可）':'Avatar', style:{width:22,height:22,borderRadius:'50%',background:this.hex(A[k].c||this.autoColor(k),T.dark?.9:1),color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8.5,fontWeight:700,flex:'0 0 auto',overflow:'hidden'}},
          A[k].abbr || (/^[A-Za-z0-9]{1,4}$/.test(k)? String(k).slice(0,3) : this.initialsFor(A[k].ja||A[k].en||k, k))),
        e('input',{key:'mm'+k+(ja?A[k].ja:A[k].en), defaultValue:ja?A[k].ja:A[k].en, title:ja?'表示名':'Display name',
          onBlur:ev=>this.mutate(d=>{ if(d.assignees[k]){ d.assignees[k][ja?'ja':'en']=ev.target.value; if(!d.assignees[k][ja?'en':'ja']) d.assignees[k][ja?'en':'ja']=ev.target.value; } }),
          style:{flex:1,minWidth:0,border:'1px solid '+T.gridStrong,background:T.panel,color:T.text,borderRadius:6,padding:'3px 7px',fontSize:11.5,outline:'none'}}),
        e('input',{key:'ab'+k+(A[k].abbr||''), defaultValue:A[k].abbr||'', title:ja?'イニシャル（アバター表示・最大4文字。空欄なら自動）':'Initials shown on avatar (max 4, auto if empty)', placeholder:ja?'略':'ab', maxLength:4,
          onBlur:ev=>this.mutate(d=>{ if(d.assignees[k]){ const v=ev.target.value.trim(); if(v) d.assignees[k].abbr=v; else delete d.assignees[k].abbr; } }),
          onKeyDown:ev=>{ if(ev.key==='Enter') ev.target.blur(); },
          style:{width:40,flex:'0 0 auto',border:'1px solid '+T.gridStrong,background:T.panel,color:T.text,borderRadius:6,padding:'3px 5px',fontSize:11,textAlign:'center',outline:'none',fontFamily:"'JetBrains Mono','Noto Sans JP',monospace"}}),
        e('span',{style:{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:T.faint,flex:'0 0 auto'}}, k))),
      this.smallBtn(ja?'＋ 担当者を追加':'+ Add member', ()=>this.addAssignee(), {accent:true}))));
    return e('div',{style:this.panelStyle()}, body);
  }

  // ---------- status bar ----------
  renderStatusBar(){
    const e=React.createElement, T=this.T, L=this.L;
    const ly=this.state.layers;
    const chip=(k,c,label,shape)=>e('div',{key:k,style:{display:'flex',alignItems:'center',gap:6}},
      e('span',{style:{width:11,height:11,borderRadius: shape==='d'?2:(shape==='dot'?'50%':3),transform:shape==='d'?'rotate(45deg)':'none',background:c,flex:'0 0 auto'}}),
      e('span',{style:{fontSize:11.5,color:T.dim,fontWeight:500}}, label));
    const lineChip=(k,c,label,dash)=>e('div',{key:k,style:{display:'flex',alignItems:'center',gap:6}},
      e('span',{style:{width:16,height:0,borderTop:(dash?'2px dashed ':'2px solid ')+c,flex:'0 0 auto'}}),
      e('span',{style:{fontSize:11.5,color:T.dim,fontWeight:500}}, label));
    const divider=(k)=>e('div',{key:k,style:{width:1,height:16,background:T.gridStrong,flex:'0 0 auto'}});
    const statusG=[]; if(ly.progress){ statusG.push(chip('ot',T.blue,L.ontrack), chip('rk',T.amber,L.risk), chip('dl',T.rose,L.delay), chip('dn',T.done,L.done)); }
    const markG=[];
    if(ly.milestones) markG.push(chip('ms',T.ms,L.lMs,'d'));
    if(ly.critical) markG.push(chip('cp',T.crit,L.critical,'d'));
    if(ly.inazuma) markG.push(lineChip('in',T.ina,L.lIna));
    if(ly.today) markG.push(lineChip('td',T.today,L.lToday,true));
    if(ly.holidays && this.state.mode==='day') markG.push(chip('hd',T.rose,L.lHoliday));
    const legend=[...statusG];
    if(statusG.length && markG.length) legend.push(divider('dv'));
    legend.push(...markG);
    const overall=Math.round((this.agg(this.allLeaves()).prog||0)*100); // グループ集計と同じ定義（人日加重 → 期間加重 → 単純平均フォールバック）
    return e('div',{style:{flex:'0 0 auto',height:38,background:T.headerBg,borderTop:'1px solid '+T.gridStrong,display:'flex',alignItems:'center',gap:16,padding:'0 18px',flexWrap:'nowrap',overflow:'hidden'}},
      e('span',{style:{fontSize:11,fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',color:T.faint,flex:'0 0 auto'}}, L.legend),
      legend,
      e('div',{style:{flex:1}}),
      e('div',{style:{display:'flex',alignItems:'center',gap:9}},
        e('span',{style:{fontSize:11.5,fontWeight:600,color:T.dim}}, L.overall),
        e('div',{style:{width:120,height:6,borderRadius:3,background:T.track,overflow:'hidden'}},
          e('div',{style:{width:overall+'%',height:'100%',background:T.blue,borderRadius:3}})),
        e('span',{style:{fontSize:12,fontWeight:700,color:T.blue,fontFamily:"'JetBrains Mono',monospace"}}, overall+'%')),
      e('span',{title:'build revision',style:{fontSize:9,color:this.hex(T.faint,.55),fontFamily:"'JetBrains Mono',monospace",whiteSpace:'nowrap',marginLeft:10,userSelect:'all'}}, this.VERSION));
  }

  // ---------- utils ----------
  hex(c,a){ if(a==null) return c; c=c.replace('#',''); if(c.length===3) c=c.split('').map(x=>x+x).join(''); const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16); return `rgba(${r},${g},${b},${a})`; }
  grad(c,T){ return T.glow? `linear-gradient(180deg, ${this.hex(c,1)}, ${this.hex(c,.82)})` : `linear-gradient(180deg, ${this.lighten(c,.12)}, ${c})`; }
  autoColor(key){ const pal=['#3b6fd4','#2f9e8f','#6d5bd0','#c56b8a','#c9902e','#4a7cc0','#2f8a80','#b0567a','#697538','#c15f3c','#4f6d94','#7a5ac2']; let h=0; const s=String(key||''); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return pal[h%pal.length]; }
  initialsFor(name,key){ const s=String((name||key||'')).trim(); if(!s) return '?';
    if(/\s/.test(s)){ const p=s.split(/\s+/); return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase(); }
    if(/[぀-ヿ㐀-鿿豈-﫿]/.test(s)) return s.slice(0,2);
    return s.slice(0,2).toUpperCase(); }
  measureText(s,size,weight){ if(!this.__mc){ this.__mc=document.createElement('canvas').getContext('2d'); } this.__mc.font=(weight||600)+' '+(size||11)+"px Inter,'Noto Sans JP',sans-serif"; return this.__mc.measureText(String(s)).width; }
  mixHex(c,base,amt){ const p=x=>{x=x.replace('#','');if(x.length===3)x=x.split('').map(y=>y+y).join('');return [parseInt(x.slice(0,2),16),parseInt(x.slice(2,4),16),parseInt(x.slice(4,6),16)];}; const a=p(c),b=p(base); const m=b.map((v,i)=>Math.round(v+(a[i]-v)*amt)); return `rgb(${m[0]},${m[1]},${m[2]})`; }
  lighten(c,amt){ c=c.replace('#',''); if(c.length===3)c=c.split('').map(x=>x+x).join(''); let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16); r=Math.round(r+(255-r)*amt);g=Math.round(g+(255-g)*amt);b=Math.round(b+(255-b)*amt); return `rgb(${r},${g},${b})`; }
}
</script>
