  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-thumb { background: rgba(120,130,150,.32); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(120,130,150,.5); border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }

</helmet>

  constructor(props) {
    super(props);
    this.boardRef = React.createRef();
    const saved = this.loadPrefs();
    this.state = {
      lang: saved.lang || props.lang || 'ja',
      variant: saved.variant || props.variant || 'A',
      density: saved.density || props.density || 'default',
      palette: saved.palette || props.palette || 'ocean',
      outLv: 3,
      mode: saved.mode || 'week',
      collapsed: {},
      openMenu: null,
      layers: Object.assign({ plan:true, progress:true, milestones:true, deps:true, critical:true, inazuma:true, today:true, weekend:true, holidays:true, grid:true }, saved.layers),
      cols: Object.assign({ assignee:true, workload:true, duration:true, progress:true }, saved.cols),
      barLabels: Object.assign({ dates:false, name:false, owner:false }, saved.barLabels),
      hover: null,
      sel: null,
      tip: null,
      doc: null,
      fileName: null,
    };
    this.fileRef = React.createRef();
  }
  componentDidMount() {
    // center on today
    requestAnimationFrame(() => {
      const el = this.boardRef.current;
      if (el) { const g = this.geo(); el.scrollLeft = Math.max(0, this.dateToX(this.TODAY, g) - 340); }
    });
    document.addEventListener('mousedown', this._closeMenu = (e) => {
      if (this.state.openMenu && !e.target.closest('[data-menu]')) this.setState({ openMenu: null });
    });
  }
  componentWillUnmount(){ document.removeEventListener('mousedown', this._closeMenu); }

  // ---------- preferences persistence ----------
  get PREF_KEY(){ return 'jsonGanttViewer.prefs.v1'; }
  loadPrefs(){ try{ const s=localStorage.getItem(this.PREF_KEY); return s? JSON.parse(s):{}; }catch(e){ return {}; } }
  savePrefs(){ try{ const st=this.state; localStorage.setItem(this.PREF_KEY, JSON.stringify({ lang:st.lang, variant:st.variant, density:st.density, palette:st.palette, mode:st.mode, layers:st.layers, cols:st.cols, barLabels:st.barLabels })); }catch(e){} }
  componentDidUpdate(pp, ps){ try{ if(!ps){ this.savePrefs(); return; } const k=['lang','variant','density','palette','mode','layers','cols','barLabels']; if(k.some(x=>ps[x]!==this.state[x])) this.savePrefs(); }catch(e){ this.savePrefs(); } }

    const S=this.STRUCT[sk]||this.STRUCT.A, P=this.PALETTES[pk]||this.PALETTES.ocean, dark=S.dark;

    const accent=dark?P.accentD:P.accentL;
    return { ...S, ...ramp, dark, glow:S.glow, mono:S.mono, radius:S.radius, rowH:S.rowH, headerH:S.headerH, fs:S.fs,

      shadow: dark?'0 2px 8px rgba(0,0,0,.35)':(S.mono?'0 1px 2px rgba(20,28,44,.06)':'0 1px 2px rgba(20,28,44,.05), 0 2px 6px rgba(20,28,44,.06)'),
      barShadow: dark?'0 1px 3px rgba(0,0,0,.45)':(S.mono?'none':'0 1px 1.5px rgba(20,28,44,.14)') };
  }

  dayKind(d){ const cal=this.CAL, k=this.isoKey(d);
    if(cal.extra && cal.extra[k]) return {}; // 特別稼働日 → 網掛けなし
    if(cal.holidays && cal.holidays[k]) return {holiday:true, label:cal.holidays[k]};
    if(!(cal.workweek||[1,2,3,4,5]).includes(d.getDay())) return {weekend:true};
    return {}; }

  // ---------- date helpers ----------
  pd(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d,12,0,0); }
  dd(a,b){ return Math.round((b-a)/86400000); }
  addD(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
  som(d){ return new Date(d.getFullYear(), d.getMonth(), 1, 12); }
  eom(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0, 12); }

  // ---------- geometry ----------
  geo(){
    let min=null, max=null;
    const scan=s=>{ if(!s) return; const d=this.pd(s); if(!d) return; if(!min||d<min)min=d; if(!max||d>max)max=d; };
    this.DATA.forEach(p=>{
      (p.milestones||[]).forEach(m=>scan(m.date));
      p.phases.forEach(ph=>ph.tasks.forEach(t=>{ [t.ps,t.pe,t.as,t.ae].forEach(scan); }));
    });
    if(!min){ min=this.TODAY; max=this.addD(this.TODAY,30); }
    const cs = this.sow(this.som(min));
    let ce = this.eom(max); ce = this.addD(this.sow(ce), 13);
    const px = { day:34, week:12, month:5 }[this.state.mode];
    const totalDays = this.dd(cs,ce)+1;
    return { cs, ce, px, totalDays, w: totalDays*px };
  }
  dateToX(d,g){ return this.dd(g.cs,d)*g.px; }

  timeCols(g){
    const mode=this.state.mode, L=this.L, ja=this.state.lang==='ja';
    const tier1=[], tier2=[];
    // tier1 = months (day/week) / years (month)
    if(mode==='month'){
      let y=g.cs.getFullYear(), last=g.ce.getFullYear();
      for(;y<=last;y++){
        const s=new Date(y,0,1,12) < g.cs ? g.cs : new Date(y,0,1,12);
        const e=new Date(y,11,31,12) > g.ce ? g.ce : new Date(y,11,31,12);
        tier1.push({label:y+(ja?'年':''), left:this.dateToX(s,g), width:(this.dd(s,e)+1)*g.px});
      }
      let cur=this.som(g.cs);
      while(cur<=g.ce){
        const s=cur<g.cs?g.cs:cur, e=this.eom(cur)>g.ce?g.ce:this.eom(cur);
        tier2.push({label: ja?this.monJa(cur.getMonth()):this.monEn(cur.getMonth()), left:this.dateToX(s,g), width:(this.dd(s,e)+1)*g.px, key:cur.getTime()});
        cur=this.addD(this.eom(cur),1);
      }
    } else {
      let cur=this.som(g.cs);
      while(cur<=g.ce){
        const s=cur<g.cs?g.cs:cur, e=this.eom(cur)>g.ce?g.ce:this.eom(cur);
        tier1.push({label: ja?`${cur.getMonth()+1}月`:`${this.monEn(cur.getMonth())} ${String(cur.getFullYear()).slice(2)}`, left:this.dateToX(s,g), width:(this.dd(s,e)+1)*g.px, key:cur.getTime()});
        cur=this.addD(this.eom(cur),1);
      }
      if(mode==='day'){
        let d=new Date(g.cs); const ja=this.state.lang==='ja';
        while(d<=g.ce){ const wd=d.getDay(); const kind=this.dayKind(d); tier2.push({label:String(d.getDate()), wd:wd, left:this.dateToX(d,g), width:g.px, weekend:!!kind.weekend, holiday:!!kind.holiday, hLabel:(kind.holiday&&kind.label)?(ja?kind.label.ja:kind.label.en):null, key:d.getTime()}); d=this.addD(d,1); }
      } else {
        let d=this.sow(g.cs);
        while(d<=g.ce){ const s=d<g.cs?g.cs:d; tier2.push({label:this.fmtMD(d), left:this.dateToX(s,g), width:g.px*7, key:d.getTime()}); d=this.addD(d,7); }
      }
    }
    return {tier1, tier2};
  }

  // ---------- rows ----------
  buildRows(){
    const rows=[]; const leafByType={};
    this.DATA.forEach(p=>{
      const pl=this.agg(p.phases.flatMap(ph=>ph.tasks));
      rows.push({kind:'project', id:p.id, depth:0, parent:null, ja:p.ja, en:p.en, accent:p.accent, agg:pl, milestones:p.milestones});
      if(this.state.collapsed[p.id]) return;
      p.phases.forEach(ph=>{
        const a=this.agg(ph.tasks);
        rows.push({kind:'phase', id:p.id+'/'+ph.id, depth:1, parent:p.id, ja:ph.ja, en:ph.en, agg:a});
        if(this.state.collapsed[p.id+'/'+ph.id]) return;
        ph.tasks.forEach(t=>{ rows.push({kind:'task', id:t.id, depth:2, parent:p.id+'/'+ph.id, task:t}); });
      });
    });
    return rows;
  }
  agg(tasks){
    let min=null,max=null,wsum=0,psum=0;
    tasks.forEach(t=>{ const s=this.pd(t.ps),e=this.pd(t.pe); if(!min||s<min)min=s; if(!max||e>max)max=e; wsum+=t.pd; psum+=t.pd*t.prog; });
    return {ps:min, pe:max, prog: wsum?psum/wsum:0, pd:wsum};
  }
  leafMap(){
    // id -> {ps,pe,rowIndex,crit}
    const rows=this.buildRows(); const m={};
    rows.forEach((r,i)=>{ if(r.kind==='task') m[r.task.id]={ps:this.pd(r.task.ps), pe:this.pd(r.task.pe), row:i, crit:r.task.crit}; });
    return {rows, m};
  }

  statusOf(t){
    const today=this.TODAY, ps=this.pd(t.ps), pe=this.pd(t.pe);
    if(t.prog>=1) return 'done';
    if(today>pe) return 'delay';
    if(t.prog===0 && today>ps) return 'risk';
    const frac=Math.max(0,Math.min(1,this.dd(ps,pe)? this.dd(ps,today)/this.dd(ps,pe):0));
    if(t.prog>0 && t.prog < frac-0.12) return 'risk';
    if(t.prog>0) return 'ontrack';
    return 'future';
  }
  statusColor(s,T){ return {ontrack:T.blue, done:T.done, risk:T.amber, delay:T.rose, future:T.faint}[s]; }

    const projects=(j.projects||[]).map(p=>({ id:String(p.id), ja:p.ja||p.en||'', en:p.en||p.ja||'', accent:!!p.accent,
      milestones:(p.milestones||[]).map(m=>({date:m.date, ja:m.ja||m.en||'', en:m.en||m.ja||'', rose:!!m.rose})),
      phases:(p.phases||[]).map(ph=>({ id:String(ph.id), ja:ph.ja||ph.en||'', en:ph.en||ph.ja||'',
        tasks:(ph.tasks||[]).map(t=>{ const pl=t.plan||{}, ac=t.actual||{}; return {

          ps:pl.start||t.ps, pe:pl.end||t.pe, as:(ac.start!==undefined?ac.start:t.as)||null, ae:(ac.end!==undefined?ac.end:t.ae)||null,
          prog: typeof t.progress==='number'?t.progress:(typeof t.prog==='number'?t.prog:0), pd:t.personDays||t.pd||0,

    (rc.holidays||j.holidays||[]).forEach(h=>{ const ds=(typeof h==='string')?h:(h&&h.date); const d=this.pd(ds); if(!d) return; const lab=(typeof h==='string')?{ja:'',en:''}:{ja:h.ja||h.en||h.label||'',en:h.en||h.ja||h.label||''}; cal.holidays[this.isoKey(d)]=lab; });
    (rc.extraWorkdays||[]).forEach(s=>{ const d=this.pd(typeof s==='string'?s:s&&s.date); if(d) cal.extra[this.isoKey(d)]=true; });

    const mono = T.mono?"'JetBrains Mono',monospace":"'JetBrains Mono','Inter',monospace";
    this.visCols().forEach(c=>{
      let inner=null;
      if(c.key==='assignee'){ inner = t? this.avatar(t.who): (r.kind==='project'? null : e('span',{style:{fontSize:10,color:T.faint}},'—')); }
      else if(c.key==='workload'){ inner=e('span',{style:{fontFamily:mono,fontSize:11.5,fontWeight:500,color:r.kind==='project'?T.text:T.dim}}, pd? pd+'':'—'); }
      else if(c.key==='duration'){ inner=e('span',{style:{fontFamily:mono,fontSize:11.5,color:T.dim}}, dur?dur+'d':'—'); }
      else if(c.key==='progress'){ inner=this.progressCell(prog,status,r.kind,T,mono); }
      cells.push(e('div',{key:c.key,style:{width:c.w,flex:'0 0 auto',padding:'0 8px',display:'flex',alignItems:'center',justifyContent: c.align==='right'?'flex-end':(c.align==='center'?'center':'flex-start')}}, inner));
    });
    return cells;
  }
  progressCell(prog,status,kind,T,mono){
    const e=React.createElement; const pct=Math.round(prog*100);
    const col = kind==='task'? this.statusColor(status,T): T.blue;
    return e('div',{style:{display:'flex',alignItems:'center',gap:7,width:'100%'}},
      e('div',{style:{flex:1,height:5,borderRadius:3,background:T.track,overflow:'hidden'}},
        e('div',{style:{width:pct+'%',height:'100%',background: prog>=1?T.done:col,borderRadius:3,transition:'width .3s'}})),
      e('span',{style:{fontFamily:mono,fontSize:10.5,fontWeight:600,color:T.dim,width:30,textAlign:'right'}}, pct+'%'));
  }
  avatar(who){
    if(!who) return null;
    const e=React.createElement, T=this.T;
    const a=this.ASSIGNEES[who] || {ja:who, en:who, c:this.autoColor(who)};
    const sz=this.state.variant==='B'?20:24;
    const shortCode=/^[A-Za-z0-9]{1,4}$/.test(String(who));
    const init=a.abbr || (shortCode? String(who).slice(0,3) : this.initialsFor(a.ja||a.en||who, who));
    const col=a.c || this.autoColor(who);
    const ilen=String(init).length;
    return e('div',{title:this.state.lang==='ja'?(a.ja||who):(a.en||who),style:{width:sz,height:sz,borderRadius:'50%',background:this.hex(col,T.dark?.9:1),color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:(ilen>=3?(sz>22?8.5:7.5):(sz>22?10.5:9.5)),fontWeight:700,letterSpacing:ilen>=3?'0':'.02em',flex:'0 0 auto',overflow:'hidden',boxShadow: T.dark?'none':'0 1px 2px rgba(20,28,44,.2)'}}, init);
  }

  // ---------- bars ----------
  renderTaskBar(t,g,rowH){
    const e=React.createElement, T=this.T, st=this.state;
    const ps=this.pd(t.ps), pe=this.pd(t.pe), x1=this.dateToX(ps,g), x2=this.dateToX(pe,g)+g.px;
    const w=Math.max(x2-x1,4), barH=this.bh(), top=(rowH-barH)/2;
    const status=this.statusOf(t), sc=this.statusColor(status,T);
    const crit = st.layers.critical && t.crit;
    const kids=[];
    // plan envelope
    if(st.layers.plan){
      kids.push(e('div',{key:'env',style:{position:'absolute',left:x1,top,width:w,height:barH,borderRadius:T.radius,
        background: st.layers.progress? T.track : this.hex(sc,T.dark?.18:.14),
        border:'1.5px solid '+(crit? T.crit : (status==='delay'||status==='risk'? this.hex(sc,.65):T.planBorder)),
        boxSizing:'border-box'}}));
    }
    // progress fill
    if(st.layers.progress && t.prog>0){
      const fw=Math.max(w*t.prog,3);
      kids.push(e('div',{key:'fill',style:{position:'absolute',left:x1,top,width:fw,height:barH,borderRadius:T.radius,
        background: prog1(t)? this.grad(T.done,T):this.grad(sc,T), boxShadow: T.glow&&!prog1(t)? '0 0 10px '+this.hex(sc,.5):T.barShadow}}));
      function prog1(tt){ return tt.prog>=1; }
    }
    // not started, plan future — subtle striped hint handled by envelope. late-start amber cap
    if(status==='risk' && t.prog===0){
      kids.push(e('div',{key:'cap',style:{position:'absolute',left:x1,top,width:4,height:barH,borderRadius:T.radius+'px 0 0 '+T.radius+'px',background:T.amber}}));
    }
    // overrun (actual end past plan end)
    if(t.ae && this.pd(t.ae)>pe){
      const ox=this.dateToX(this.pd(t.ae),g)+g.px;
      kids.push(e('div',{key:'over',style:{position:'absolute',left:x2,top:top+barH*0.18,width:Math.max(ox-x2,3),height:barH*0.64,borderRadius:'0 '+T.radius+'px '+T.radius+'px 0',background:this.hex(T.rose,.85),backgroundImage:'repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.25) 3px,rgba(255,255,255,.25) 6px)'}}));
    }
    // ---- bar labels (toggleable): owner + start-date on the LEFT, name + end-date on the RIGHT ----
    const bl=st.barLabels||{};
    const mono=T.mono?"'JetBrains Mono',monospace":"'JetBrains Mono','Inter',monospace";
    const avSize=st.variant==='B'?20:24;
    let leftX=x1-7;
    if(bl.owner){
      kids.push(e('div',{key:'ow',style:{position:'absolute',left:leftX-avSize,top:(rowH-avSize)/2,pointerEvents:'none'}}, this.avatar(t.who)));
      leftX -= avSize+7;
    }
    if(bl.dates){
      kids.push(e('div',{key:'ds',style:{position:'absolute',left:leftX,top:0,height:rowH,transform:'translateX(-100%)',display:'flex',alignItems:'center',fontSize:9.5,fontWeight:500,color:T.faint,fontFamily:mono,whiteSpace:'nowrap',pointerEvents:'none'}}, this.fmtMD(ps)));
    }
    let rightX=x2+7;
    if(bl.dates){
      const es=this.fmtMD(pe);
      kids.push(e('div',{key:'de',style:{position:'absolute',left:rightX,top:0,height:rowH,display:'flex',alignItems:'center',fontSize:9.5,fontWeight:500,color:T.faint,fontFamily:mono,whiteSpace:'nowrap',pointerEvents:'none'}}, es));
      rightX += this.measureText(es,9.5,500)+10;
    }
    if(bl.name){
      const nm=st.lang==='ja'?t.ja:t.en;
      kids.push(e('div',{key:'nm',style:{position:'absolute',left:rightX,top:0,height:rowH,display:'flex',alignItems:'center',fontSize:11,fontWeight:500,color:T.dim,whiteSpace:'nowrap',pointerEvents:'none'}}, nm));
    }
    const pctLabel = t.prog>0 && t.prog<1 && w>44 && !bl.dates && !bl.name && !bl.owner;
    // tooltip (custom, instant)
    const tipData={ name: st.lang==='ja'?t.ja:t.en, who:t.who, ps, pe, as:t.as, ae:t.ae, prog:t.prog, pd:t.pd, status };
    kids.push(e('div',{key:'hit', onMouseEnter:ev=>this.showTip(ev,tipData), onMouseLeave:()=>this.hideTip(), style:{position:'absolute',left:x1-3,top:top-3,width:w+6,height:barH+6,cursor:'default'}}));
    if(pctLabel){
      kids.push(e('div',{key:'pl',style:{position:'absolute',left:x2+6,top:0,height:rowH,display:'flex',alignItems:'center',fontSize:10.5,fontWeight:600,color:T.dim,fontFamily:T.mono?"'JetBrains Mono',monospace":'inherit',pointerEvents:'none',whiteSpace:'nowrap'}}, Math.round(t.prog*100)+'%'));
    }
    return kids;
  }

  renderSummaryBar(r,g,rowH){
    const e=React.createElement, T=this.T, a=r.agg; if(!a||!a.ps) return null;
    const x1=this.dateToX(a.ps,g), x2=this.dateToX(a.pe,g)+g.px, w=Math.max(x2-x1,4);
    const isProj=r.kind==='project';
    const h=isProj?8:6, top=(rowH-h)/2;
    const col=isProj?T.blue:T.dim;
    return e('div',{style:{position:'absolute',left:x1,top,width:w,height:h}},
      e('div',{style:{position:'absolute',inset:0,borderRadius:2,background:this.hex(col,T.dark?.3:.22)}}),
      e('div',{style:{position:'absolute',left:0,top:0,height:'100%',width:(a.prog*100)+'%',borderRadius:2,background:this.hex(col,T.dark?.85:.7)}}),
      // end caps
      e('div',{style:{position:'absolute',left:0,top:0,width:0,height:0,borderLeft:'4px solid transparent',borderRight:'4px solid transparent',borderTop:'5px solid '+this.hex(col,.55)}}),
      e('div',{style:{position:'absolute',right:0,top:0,width:0,height:0,borderLeft:'4px solid transparent',borderRight:'4px solid transparent',borderTop:'5px solid '+this.hex(col,.55)}}));
  }

  renderMilestones(r,g,rowH){
    const e=React.createElement, T=this.T, ja=this.state.lang==='ja';
    return (r.milestones||[]).map((ms,i)=>{
      const x=this.dateToX(this.pd(ms.date),g)+g.px/2, c=ms.rose?T.rose:T.ms, sz=11;
      return e('div',{key:i,title:(ja?ms.ja:ms.en)+' · '+this.fmtMD(this.pd(ms.date)),style:{position:'absolute',left:x,top:rowH/2,transform:'translate(-50%,-50%)',display:'flex',alignItems:'center',gap:6,zIndex:7}},
        e('div',{style:{width:sz,height:sz,background:c,transform:'rotate(45deg)',borderRadius:2,boxShadow: T.glow?'0 0 8px '+this.hex(c,.6):'0 1px 3px rgba(20,28,44,.35)',border:'1.5px solid '+(T.dark?'#0d1420':'#fff'),flex:'0 0 auto'}}),
        e('div',{style:{fontSize:10.5,fontWeight:700,color:c,whiteSpace:'nowrap',fontFamily:T.mono?"'JetBrains Mono',monospace":'inherit',
          background:T.panel,border:'1px solid '+this.hex(c,.38),borderRadius:6,padding:'2px 7px',lineHeight:1.2,
          boxShadow:T.dark?'0 2px 6px rgba(0,0,0,.5)':'0 1px 3px rgba(20,28,44,.18)'}}, ja?ms.ja:ms.en));
    });
  }

  // ---------- SVG overlay: deps + inazuma + today line ----------
  renderOverlay(g,leftW,rowH,rows,m,rowsH){
    const e=React.createElement, T=this.T, st=this.state;
    const els=[];
    // dependency arrows
    if(st.layers.deps){
      const allTasks=[]; this.DATA.forEach(p=>p.phases.forEach(ph=>ph.tasks.forEach(t=>allTasks.push(t))));
      allTasks.forEach(t=>{ (t.deps||[]).forEach(dep=>{
        const a=m[dep], b=m[t.id]; if(!a||!b) return;
        const x1=this.dateToX(a.pe,g)+g.px, y1=a.row*rowH+rowH/2;
        const x2=this.dateToX(b.ps,g), y2=b.row*rowH+rowH/2;
        const isCrit = st.layers.critical && a.crit && b.crit;
        const col = isCrit? T.crit : (T.dark? T.faint : T.dim);
        const sw = isCrit?1.8:1.2;
        const gap=9; const mx=x1+gap;
        let d;
        if(x2>=mx){ d=`M${x1},${y1} L${mx},${y1} L${mx},${y2} L${x2-6},${y2}`; }
        else { const back=x2-gap; const midY=y2>y1? y1+rowH*0.5 : y1-rowH*0.5; d=`M${x1},${y1} L${mx},${y1} L${mx},${midY} L${back},${midY} L${back},${y2} L${x2-6},${y2}`; }
        els.push(e('path',{key:dep+'>'+t.id,d,fill:'none',stroke:col,strokeWidth:sw,opacity: isCrit?.9:.55,markerEnd:isCrit?'url(#ah-c)':'url(#ah)'}));
      }); });
    }
    // inazuma (slip) line
    let ina=null;
    if(st.layers.inazuma){
      const leaves=rows.map((r,i)=>({r,i})).filter(o=>o.r.kind==='task');
      if(leaves.length){
        const todayX=this.dateToX(this.TODAY,g);
        const pts=[[todayX, 0]];
        leaves.forEach(o=>{ const t=o.r.task, ps=this.pd(t.ps),pe=this.pd(t.pe);
          const ax = this.dateToX(this.addD(ps, Math.round(this.dd(ps,pe)*t.prog)),g)+g.px*t.prog;
          pts.push([ax, o.i*rowH+rowH/2]); });
        pts.push([todayX, rowsH]);
        const dstr='M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' L');
        ina=e('g',{key:'ina'},
          e('path',{d:dstr,fill:'none',stroke:T.ina,strokeWidth:1.6,strokeLinejoin:'round',opacity:.62,style:{filter:T.glow?'drop-shadow(0 0 3px '+this.hex(T.ina,.45)+')':'none'}}),
          pts.slice(1,-1).map((p,i)=>e('circle',{key:i,cx:p[0],cy:p[1],r:2.4,fill:T.panel,stroke:T.ina,strokeWidth:1.5,opacity:.8})));
      }
    }
    // today line
    const todayX=this.dateToX(this.TODAY,g);
    const todayLine = st.layers.today? e('line',{x1:todayX,y1:0,x2:todayX,y2:rowsH,stroke:T.today,strokeWidth:1.6,strokeDasharray:'5 4',opacity:.85}):null;

    return e('svg',{width:g.w,height:rowsH,style:{position:'absolute',left:leftW,top:0,overflow:'visible',pointerEvents:'none',zIndex:6}},
      e('defs',null,
        e('marker',{id:'ah',markerWidth:8,markerHeight:8,refX:6,refY:3,orient:'auto',markerUnits:'userSpaceOnUse'}, e('path',{d:'M0,0 L6,3 L0,6 z',fill:T.dark?T.faint:T.dim,opacity:.7})),
        e('marker',{id:'ah-c',markerWidth:8,markerHeight:8,refX:6,refY:3,orient:'auto',markerUnits:'userSpaceOnUse'}, e('path',{d:'M0,0 L6,3 L0,6 z',fill:T.crit}))),
      todayLine, els, ina);
  }

  // ---------- status bar ----------
  renderStatusBar(){
    const e=React.createElement, T=this.T, L=this.L;
    const ly=this.state.layers;
    const chip=(k,c,label,shape)=>e('div',{key:k,style:{display:'flex',alignItems:'center',gap:6}},
      e('span',{style:{width:11,height:11,borderRadius: shape==='d'?2:(shape==='dot'?'50%':3),transform:shape==='d'?'rotate(45deg)':'none',background:c,flex:'0 0 auto'}}),
      e('span',{style:{fontSize:11.5,color:T.dim,fontWeight:500}}, label));
    const lineChip=(k,c,label,dash)=>e('div',{key:k,style:{display:'flex',alignItems:'center',gap:6}},
      e('span',{style:{width:16,height:0,borderTop:(dash?'2px dashed ':'2px solid ')+c,flex:'0 0 auto'}}),
      e('span',{style:{fontSize:11.5,color:T.dim,fontWeight:500}}, label));
    const divider=(k)=>e('div',{key:k,style:{width:1,height:16,background:T.gridStrong,flex:'0 0 auto'}});
    // legend reflects active display layers
    const statusG=[]; if(ly.progress){ statusG.push(chip('ot',T.blue,L.ontrack), chip('rk',T.amber,L.risk), chip('dl',T.rose,L.delay), chip('dn',T.done,L.done)); }
    const markG=[];
    if(ly.milestones) markG.push(chip('ms',T.ms,L.lMs,'d'));
    if(ly.critical) markG.push(chip('cp',T.crit,L.critical,'d'));
    if(ly.inazuma) markG.push(lineChip('in',T.ina,L.lIna));
    if(ly.today) markG.push(lineChip('td',T.today,L.lToday,true));
    if(ly.holidays && this.state.mode==='day') markG.push(chip('hd',T.rose,L.lHoliday));
    const legend=[...statusG];
    if(statusG.length && markG.length) legend.push(divider('dv'));
    legend.push(...markG);
    // overall progress across all
    let ws=0,ps=0; this.DATA.forEach(p=>p.phases.forEach(ph=>ph.tasks.forEach(t=>{ws+=t.pd;ps+=t.pd*t.prog;})));
    const overall=Math.round(ps/ws*100);
    return e('div',{style:{flex:'0 0 auto',height:38,background:T.headerBg,borderTop:'1px solid '+T.gridStrong,display:'flex',alignItems:'center',gap:16,padding:'0 18px',flexWrap:'nowrap',overflow:'hidden'}},
      e('span',{style:{fontSize:11,fontWeight:700,letterSpacing:'.04em',textTransform:'uppercase',color:T.faint,flex:'0 0 auto'}}, L.legend),
      legend,
      e('div',{style:{flex:1}}),
      e('div',{style:{display:'flex',alignItems:'center',gap:9}},
        e('span',{style:{fontSize:11.5,fontWeight:600,color:T.dim}}, L.overall),
        e('div',{style:{width:120,height:6,borderRadius:3,background:T.track,overflow:'hidden'}},
          e('div',{style:{width:overall+'%',height:'100%',background:T.blue,borderRadius:3}})),
        e('span',{style:{fontSize:12,fontWeight:700,color:T.blue,fontFamily:"'JetBrains Mono',monospace"}}, overall+'%')));
  }

  // ---------- utils ----------
  hex(c,a){ if(a==null) return c; c=c.replace('#',''); if(c.length===3) c=c.split('').map(x=>x+x).join(''); const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16); return `rgba(${r},${g},${b},${a})`; }
  grad(c,T){ return T.glow? `linear-gradient(180deg, ${this.hex(c,1)}, ${this.hex(c,.82)})` : `linear-gradient(180deg, ${this.lighten(c,.12)}, ${c})`; }
  // deterministic color from a key (used when assignee.color is omitted)
  autoColor(key){ const pal=['#3b6fd4','#2f9e8f','#6d5bd0','#c56b8a','#c9902e','#4a7cc0','#2f8a80','#b0567a','#697538','#c15f3c','#4f6d94','#7a5ac2']; let h=0; const s=String(key||''); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return pal[h%pal.length]; }
  // 2-char initials from a display name or code (handles EN "Taro Sato"→TS, JP 田中太郎→田中, code SM→SM)
  initialsFor(name,key){ const s=String((name||key||'')).trim(); if(!s) return '?';
    if(/\s/.test(s)){ const p=s.split(/\s+/); return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase(); }
    if(/[぀-ヿ㐀-鿿豈-﫿]/.test(s)) return s.slice(0,2);
    return s.slice(0,2).toUpperCase(); }
  measureText(s,size,weight){ if(!this.__mc){ this.__mc=document.createElement('canvas').getContext('2d'); } this.__mc.font=(weight||600)+' '+(size||11)+"px Inter,'Noto Sans JP',sans-serif"; return this.__mc.measureText(String(s)).width; }
  mixHex(c,base,amt){ const p=x=>{x=x.replace('#','');if(x.length===3)x=x.split('').map(y=>y+y).join('');return [parseInt(x.slice(0,2),16),parseInt(x.slice(2,4),16),parseInt(x.slice(4,6),16)];}; const a=p(c),b=p(base); const m=b.map((v,i)=>Math.round(v+(a[i]-v)*amt)); return `rgb(${m[0]},${m[1]},${m[2]})`; }
  lighten(c,amt){ c=c.replace('#',''); if(c.length===3)c=c.split('').map(x=>x+x).join(''); let r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16); r=Math.round(r+(255-r)*amt);g=Math.round(g+(255-g)*amt);b=Math.round(b+(255-b)*amt); return `rgb(${r},${g},${b})`; }
}
</script>
